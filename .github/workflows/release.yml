name: TrimLab Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
            artifact: TrimLab-Setup.msi
            glob: "src-tauri/target/release/bundle/msi/*.msi"

          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            artifact: TrimLab-Setup-arm.dmg
            glob: "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg"

          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            artifact: TrimLab-Setup-intel.dmg
            glob: "src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg"

          - platform: ubuntu-22.04
            args: ""
            artifact: TrimLab-Setup.AppImage
            glob: "src-tauri/target/release/bundle/appimage/*.AppImage"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build TrimLab
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: TrimLab ${{ github.ref_name }}
          releaseBody: |
            ## TrimLab ${{ github.ref_name }}

            ### Téléchargement
            - **Windows** : `TrimLab-Setup.msi`
            - **macOS Apple Silicon** : `TrimLab-Setup-arm.dmg`
            - **macOS Intel** : `TrimLab-Setup-intel.dmg`
            - **Linux** : `TrimLab-Setup.AppImage`
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Rename artifact
        shell: bash
        run: |
          FILE=$(ls ${{ matrix.glob }} | head -1)
          DIR=$(dirname "$FILE")
          cp "$FILE" "$DIR/${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.glob }}
